# =============================================================================
# XOps 示例配置文件
# 路径: ~/.xops/xops_config.yaml
# 密钥: ~/.xops/secret.key (自动生成，用于加密密码字段)
# =============================================================================


# =============================================================================
# identities — 认证身份信息
# 每个条目是一个命名的认证配置，可被多个 Node 复用。
# 密码/私钥密码字段在首次 save 后会被 AES 加密存储。
# =============================================================================

# 【可选】全局自定义密码提示正则，golang正则表达式格式。若非英语系统可在此处统一配置。
# 此配置项在进入需要提权的交互式shell时匹配sudo密码提示词，如 `[sudo] user 的密码：`。  
# 只有当发现目标机器给出的提权密码提示符不在内置列表中导致提权 Hang 住时，才需要使用此配置项进行覆盖定制。
password_prompt_pattern: "(?i)password:"

identities:

  # 使用 SSH 私钥认证
  id-key-default:
    user: ubuntu                        # 远程登录用户名
    auth_type: key                      # 认证方式: key | password | agent
    key_path: ~/.ssh/id_ed25519         # 私钥文件路径
    passphrase: ""                      # 私钥密码（为空则无密码）

  # 使用 SSH Agent 认证（无需指定密钥路径，由 SSH Agent 代理）（暂未实现）
  id-agent:
    user: ubuntu
    auth_type: agent

  # 使用密码认证
  id-password:
    user: root
    auth_type: password
    password: "your-password-here"      # 密码为加密项，必须通过命令行添加

  # 带私钥密码的认证
  id-key-with-passphrase:
    user: deploy
    auth_type: key
    key_path: ~/.ssh/deploy_rsa
    passphrase: "my-key-passphrase"     # 密码为加密项，必须通过命令行添加


# =============================================================================
# hosts — 主机网络信息
# 定义主机的地址和端口，与认证信息解耦，便于复用。
# =============================================================================
hosts:

  host-web-1:
    address: 192.168.1.10               # IP 地址或域名
    port: 22                            # SSH 端口
    alias:                              # 可选别名列表，用于快速查找，可填写同一台服务器的多个ip
      - web1
      - frontend-1

  host-web-2:
    address: 192.168.1.11
    port: 22

  host-db-primary:
    address: 10.0.0.100
    port: 2222                          # 非标准端口

  host-bastion:
    address: bastion.example.com        # 支持域名
    port: 22
    alias:
      - jump
      - gateway

  host-internal-app:
    address: 172.16.0.50               # 内网地址（通过跳板机访问）
    port: 22


# =============================================================================
# nodes — 节点（操作单元）
# Node 是 XOps 的核心概念，聚合 Host + Identity，支持标签分组和跳板机。
# =============================================================================
nodes:

  # 普通节点：直接连接
  web-1:
    host_ref: host-web-1                # 引用 hosts 中的条目
    identity_ref: id-key-default        # 引用 identities 中的条目
    tags:
      - web
      - prod
    sudo_mode: sudo                     # 提权方式: none | sudo | sudoer | su | root | auto
    # password_prompt_pattern: "(?i)mot de passe:" # 【可选】节点级自定义密码提示正则，优先级高于全局配置
    alias:
      - frontend-1

  web-2:
    host_ref: host-web-2
    identity_ref: id-key-default
    tags:
      - web
      - prod
    sudo_mode: sudo

  # 数据库节点：使用密码认证
  db-primary:
    host_ref: host-db-primary
    identity_ref: id-password
    tags:
      - database
      - prod
    sudo_mode: none                     # 不需要提权

  # 跳板机节点
  bastion:
    host_ref: host-bastion
    identity_ref: id-agent
    tags:
      - bastion
      - infra
    sudo_mode: none

  # 通过跳板机访问的内网节点
  app-internal:
    host_ref: host-internal-app
    identity_ref: id-key-default
    tags:
      - app
      - internal
      - prod
    proxy_jump: bastion                 # 指向跳板机节点的 Name
    sudo_mode: sudo

  # su 提权（适用于只能 su 切换而非 sudo 的环境）
  legacy-server:
    host_ref: host-web-1
    identity_ref: id-password
    tags:
      - legacy
    sudo_mode: su
    su_pwd: "root-password"             # su 所需的 root 密码，保存后自动加密

  # 开发环境节点（宽松策略）
  dev-box:
    host_ref: host-web-2
    identity_ref: id-key-default
    tags:
      - dev
    sudo_mode: auto                     # auto: 自动探测提权方式


# =============================================================================
# guardrail — MCP 安全护栏（可选）
# 保护 Agent 通过 MCP 协议执行危险操作时的审批和审计机制。
# 不配置此节时使用内置默认值。
# =============================================================================
guardrail:

  # 是否启用护栏。设为 false 则所有操作直接放行（不推荐用于生产环境）
  enabled: true

  # 审计日志路径（JSON Lines 格式，记录所有工具调用的风险等级和执行结果）
  audit_log: ~/.xops/audit.log

  # 触发用户审批的最低风险等级
  #   safe      — 所有操作都需要审批（最严格）
  #   moderate  — 写操作、上传、删除需要审批
  #   dangerous — 仅真正危险的操作需要审批（默认，推荐）
  approval_threshold: dangerous

  # 当 MCP 客户端不支持 Elicitation（如 Gemini CLI）时的回退策略
  #   deny      — 拒绝所有需要审批的操作（最安全，但不兼容 Gemini CLI）
  #   allow     — 放行所有操作，依赖客户端内置的工具审批机制
  #   downgrade — 放行 moderate 操作，仍拒绝 dangerous（默认，推荐折中）
  no_elicit_fallback: downgrade

  # 永久封锁的命令模式（glob 格式，无论审批结果均拒绝执行）
  # 注：rm -rf /、mkfs、dd of=/dev/、fork bomb 等已内置封锁，无需在此重复
  blocked_patterns:
    - "*.sh"                            # 禁止执行任意 shell 脚本
    # - "curl*"                         # 示例：禁止所有 curl 命令

  # 受保护路径（访问这些路径会将风险等级提升至至少 moderate）
  # 注：/etc /boot /usr /sbin /root 已内置，此处可追加额外路径
  protected_paths:
    - /var/lib
    - /opt/app/secrets

  # 节点级别的策略覆盖（支持 glob 模式匹配节点名称）
  # 可对特定节点设置比全局更严格或更宽松的 approval_threshold
  nodes:
    # 生产节点：更严格，所有写操作都需要审批
    "prod-*":
      approval_threshold: moderate

    # 开发节点：更宽松，只有 dangerous 操作才需要审批
    "dev-*":
      approval_threshold: dangerous

    # 精确匹配单个节点
    "db-primary":
      approval_threshold: safe          # 数据库节点最严格，任何操作都需要确认
