# ---- scp ----
scp_short:
  other: "Transfer files between local and remote hosts"
scp_long:
  other: "Transfer files between local and remote hosts with parallel multi-host support.\nSupported scenarios:\n1. Upload local to remote: xops scp local_path user@host:remote_path\n2. Download remote to local: xops scp user@host:remote_path local_path\n3. Remote to remote: xops scp user1@host1:path1 user2@host2:path2\n4. Batch upload: xops scp local_path --dest remote_path -H host1,host2\n5. Group transfer: xops scp local_path --dest remote_path -t web\n\nFlag values override positional arguments.\nIf no password is specified, it will be read from the terminal or saved config.\nWhen using --tag, other host specification methods are ignored."
flag_scp_src:
  other: "Source path (batch mode)"
flag_scp_dest:
  other: "Destination path (batch mode)"
flag_ifile:
  other: "Host list file path"
flag_scp_tag:
  other: "Transfer by group (tag)"
flag_recursive:
  other: "Copy directories recursively"
flag_progress:
  other: "Show transfer progress"
flag_force:
  other: "Force overwrite remote files"
flag_task:
  other: "Number of parallel host transfers"
flag_thread:
  other: "Concurrent threads per file transfer"
scp_error:
  other: "[{{.Label}}] Error: {{.Error}}"
scp_transfer_failed:
  other: "[{{.Label}}] Transfer failed: {{.Error}}"
scp_done:
  other: "[{{.Label}}] Done"
scp_save_config_failed:
  other: "Failed to save config: {{.Error}}"

# ---- sftp ----
sftp_short:
  other: "Connect to a remote host via SFTP"
sftp_long:
  other: "Connect to a remote host via SFTP and open an interactive terminal.\nUsage examples:\nxops sftp user@host[:port] [-P password] [--task maxTask] [--thread maxThread]\nUser and host are required, port defaults to 22.\nWhen provided via flags, flag values override positional arguments.\nIf no password is specified, it will be read from the terminal or saved config.\nPasswords of successful connections are encrypted and stored at ~/.xops_passwords.json"
flag_sftp_task:
  other: "Max concurrent file downloads"
flag_sftp_thread:
  other: "Concurrent threads per file"

# ---- exec ----
exec_short:
  other: "Execute commands on one or more remote hosts"
exec_long:
  other: "Execute commands on one or more remote hosts. Supports batch execution and privilege escalation.\nUsage examples:\nxops exec -H host1,host2 -c \"uptime\"\nxops exec -t web -c \"uptime\"\nxops exec -I hosts.txt --shell script.sh\nxops exec user@host \"df -h\"\n\nFlag values override positional arguments.\nWhen using --tag, other host specification methods are ignored."
