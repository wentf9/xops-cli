# ---- ssh ----
ssh_short:
  other: "Connect to a remote host via SSH"
ssh_long:
  other: "Connect to a remote host via SSH and open an interactive terminal.\nUsage examples:\nxops ssh user@host[:port]\nxops ssh user host [port]\nxops -h host -u user\nUser and host are required, port defaults to 22.\nWhen provided via flags, flag values override positional arguments.\nIf no password is specified via -p, it will be read from the terminal or a saved config.\nPasswords of successful connections are encrypted and stored at ~/.xops_passwords.json"
