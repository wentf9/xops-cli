# ---- scp ----
scp_short:
  other: "在本地和远程主机之间传输文件"
scp_long:
  other: "在本地和远程主机之间传输文件，支持多台主机并行传输。\n支持以下场景:\n1. 从本地上传到远程: xops scp local_path user@host:remote_path\n2. 从远程下载到本地: xops scp user@host:remote_path local_path\n3. 远程到远程传输: xops scp user1@host1:path1 user2@host2:path2\n4. 批量上传到多台主机: xops scp local_path --dest remote_path -H host1,host2\n5. 按分组传输: xops scp local_path --dest remote_path -t web\n\n通过flags提供主机和用户信息时会覆盖参数提供的信息。\n如果未通过-w选项显式提供密码, 将会从终端输入或通过保存的配置文件读取。\n使用 --tag 时会忽略其他主机指定方式。"
flag_scp_src:
  other: "源路径 (批量模式使用)"
flag_scp_dest:
  other: "目标路径 (批量模式使用)"
flag_ifile:
  other: "主机列表文件路径"
flag_scp_tag:
  other: "按分组(标签)传输"
flag_recursive:
  other: "递归复制目录"
flag_progress:
  other: "显示传输进度"
flag_force:
  other: "强制覆盖远程文件"
flag_task:
  other: "并行传输的主机数"
flag_thread:
  other: "单个文件传输的并发线程数"
