  other: "目标主机/连接别名"
flag_hosts:
  other: "目标主机,多个主机用逗号分隔"
flag_port:
  other: "SSH端口"
flag_user:
  other: "SSH用户名"
flag_password:
  other: "SSH密码"
flag_key:
  other: "SSH私钥文件路径"
flag_key_pass:
  other: "SSH私钥密码"
flag_sudo:
  other: "是否请求sudo权限"
flag_jump:
  other: "跳板机地址[user@]host[:port]"
flag_alias:
