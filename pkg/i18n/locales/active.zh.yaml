  other: "[{{.Label}}] 错误: {{.Error}}"
scp_transfer_failed:
  other: "[{{.Label}}] 传输失败: {{.Error}}"
scp_done:
  other: "[{{.Label}}] 完成"
scp_save_config_failed:
  other: "保存配置失败: {{.Error}}"

# ---- sftp ----
sftp_short:
  other: "通过sftp连接到指定主机"
sftp_long:
  other: "通过sftp连接到指定主机并提供交互式终端。\n用法示例:\nxops sftp user@host[:port] [-P password] [--task maxTask] [--thread maxThread]\n用户和主机为必选参数,端口默认为22,一般不需要修改\n通过flags提供主机和用户信息时会忽略参数提供的信息\n如果未通过-p选项显式提供密码,将会从终端输入或通过保存的密码文件读取密码\n成功登录过的用户和主机组合的密码将会保存到密码文件中\n密码采用对称加密算法加密保存,密码文件位置为~/.xops_passwords.json"
